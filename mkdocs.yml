    - Scheduler Features: SCHEDULER_FEATURES.md
    - Observation Lifecycle: OBSERVATION_LIFECYCLE.md
    - Repetitive Observations: REPETITIVE_OBSERVATIONS.md
  - Projects: PROJECTS_GUIDE.md
  - Practical Guide: PRACTICAL_GUIDE.md
  - Notifications: NOTIFICATIONS.md
  - Imaging:
    - Autofocus Guide: AUTOFOCUS_GUIDE.md
    - Guiding Guide: GUIDING_GUIDE.md
    - Calibration Guide: CALIBRATION_GUIDE.md
  - Data & Storage:
    - Observation Files: OBSERVATION_FILES.md
    - Image Processing: IMAGE_PROCESSING.md
    - External Storage: EXTERNAL_STORAGE.md
  - User Profile: USER_PROFILE.md
  - Administration:
    - Organizations: ORGANIZATIONS.md
    - Observatory Administration: OBSERVATORY_ADMINISTRATION.md
    - Calibration Administration: CALIBRATION_ADMINISTRATION.md
